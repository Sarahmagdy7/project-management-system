<div class="contact-page py-5">
  <div class="container mt-5">
    <div class="row g-0 shadow-lg rounded-15 overflow-hidden">
      
      <div class="col-lg-5 bg-primary text-white p-5">
        <div class="info-wrap">
          <h2 class="fw-bold mb-4">Contact Information</h2>
          <p class="mb-5 opacity-75">Fill out the form and our team will get back to you within 24 hours.</p>
          
          <ul class="list-unstyled">
            <li class="d-flex align-items-center mb-4">
              <i class="bi bi-geo-alt-fill me-3 fs-4"></i>
              <span>Assiut University of Technology, Egypt</span>
            </li>
            <li class="d-flex align-items-center mb-4">
              <i class="bi bi-envelope-fill me-3 fs-4"></i>
              <span>support@it-student.com</span>
            </li>
            <li class="d-flex align-items-center">
              <i class="bi bi-telephone-fill me-3 fs-4"></i>
              <span>+20 123 456 789</span>
            </li>
          </ul>
        </div>
      </div>

      <div class="col-lg-7 bg-white p-5">
        <form [formGroup]="contactForm" (ngSubmit)="onSend()">
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label fw-bold">Name</label>
              <input type="text" formControlName="name" class="form-control" placeholder="Your Name">
            </div>
            <div class="col-md-6">
              <label class="form-label fw-bold">Email</label>
              <input type="email" formControlName="email" class="form-control" placeholder="Email@example.com">
            </div>
            <div class="col-12">
              <label class="form-label fw-bold">Subject</label>
              <input type="text" formControlName="subject" class="form-control" placeholder="Subject">
            </div>
            <div class="col-12">
              <label class="form-label fw-bold">Message</label>
              <textarea formControlName="message" class="form-control" rows="4" placeholder="Write here..."></textarea>
            </div>
            <div class="col-12 mt-4">
              <button type="submit" class="btn btn-dark w-100 py-3 rounded-pill" [disabled]="contactForm.invalid">
                Send Message
              </button>
            </div>
          </div>
        </form>
      </div>

    </div>
  </div>
</div>
