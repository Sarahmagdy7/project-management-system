<div class="container mt-5">
  <div class="form-wrapper shadow-sm">
    <h2 class="mb-4 fw-bold">Create project</h2>

    <form [formGroup]="projectForm" (ngSubmit)="onSubmit()">
      <div class="card p-4">
        <h5 class="mb-4">Basic information</h5>
        
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label">Project Name</label>
            <input type="text" formControlName="projectName" class="form-control" placeholder="Enter project name">
            <div class="text-danger small" *ngIf="projectForm.get('projectName')?.touched && projectForm.get('projectName')?.invalid">
              Project name is required (min 3 chars).
            </div>
          </div>

          <div class="col-md-6">
            <label class="form-label">Status</label>
            <select formControlName="status" class="form-select">
              <option value="Active">Active</option>
              <option value="In Progress">In Progress</option>
              <option value="Completed">Completed</option>
            </select>
          </div>

          <div class="col-md-6">
            <label class="form-label">Vendor</label>
            <input type="text" formControlName="vendor" class="form-control">
          </div>
          <div class="col-md-6">
            <label class="form-label">Tags</label>
            <input type="text" formControlName="tags" class="form-control">
          </div>

          <div class="col-12">
            <label class="form-label">Description</label>
            <textarea formControlName="description" class="form-control" rows="4" placeholder="Describe the project..."></textarea>
            <div class="text-danger small" *ngIf="projectForm.get('description')?.touched && projectForm.get('description')?.invalid">
              Description is required.
            </div>
          </div>
        </div>

        <div class="mt-4 d-flex gap-2">
          <button type="submit" class="btn btn-primary px-4">Save Project</button>
          <button type="button" class="btn btn-light px-4" routerLink="/projects">Cancel</button>
        </div>
      </div>
    </form>
  </div>
</div>
